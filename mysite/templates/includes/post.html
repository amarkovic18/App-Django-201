{% load thumbnail %}
<div class="max-w-4xl bg-white rounded py-6 px-10 my-6" style="width:50rem;">
    <div class="flex items-center justify-between">
        <span class="font-light text-gray-400">
            {{post.date|date:"F j, Y, g:i:a"}}
        </span>
    </div>
    <div class="mt-2">
        <p class="mt-2">{{post.text}} created by {{post.author.username}}</p>
    </div>
    <div class="mt-4 flex justify-between items-center">
    {% if show_detail_link %}
    <a class="text-indigo-500  hover:underline" href="{% url 'feed:detail' post.id %}">Read more</a>
    {% else %}
    <span>&nbsp;</span>
    {% endif %}
    <div>
        <a class="flex flex-row items-center" href="{% url 'profiles:detail' post.author.username %}">
        {% thumbnail post.author.profile.image '100x100' crop="center" as im %}
            <img src="{{im.url}}" class="object-cover mr-2 h-10 w-10 rounded-full hidden sm:block">
            {% endthumbnail %}
            <h1 class="text-indigo-700 text-lg">{{post.author.username}}</h1>
        </a>
    </div>


</div>
</div>
